name: Update PSX data

on:
  schedule:
    # 11:00 UTC = 4:00pm PKT (PKT is UTC+5) — after market close (~3:30pm PKT),
    # giving PSX's end-of-day data time to post. Adjust if data looks stale.
    - cron: "0 11 * * 1-5"   # Mon-Fri only, PSX doesn't trade weekends
  workflow_dispatch: {}       # lets you trigger it manually from the Actions tab to test

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run pipeline
        run: |
          python db.py
          python fetch_data.py
          python indicators.py
          python sentiment.py
          python export_snapshot.py

      - name: Commit updated snapshot
        run: |
          git config user.name "psx-tracker-bot"
          git config user.email "actions@github.com"
          git add data/latest.json
          git diff --staged --quiet || git commit -m "Update PSX data snapshot $(date -u +%Y-%m-%d)"
          git push
